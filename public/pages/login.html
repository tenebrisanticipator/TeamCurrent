<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Team Current</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background: var(--navy); overflow: hidden;
    }
    
    .login-overlay-grid {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(245,166,35,0.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(245,166,35,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 1; pointer-events: none;
    }
    
    .login-glow {
      position: absolute; width: 400px; height: 400px;
      background: radial-gradient(circle at center, rgba(245,166,35,0.1) 0%, transparent 70%); border-radius: 50%;
      animation: floatGlow 15s infinite alternate ease-in-out;
      z-index: 2; pointer-events: none;
    }
    .glow-1 { top: -100px; left: -100px; }
    .glow-2 { bottom: -100px; right: -100px; animation-delay: -7.5s; }
    
    @keyframes floatGlow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 40px); }
    }

    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 40px;
      background: rgba(17,34,54,0.7); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      
      opacity: 0; transform: translateY(30px);
      animation: dropin 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }
    
    .logo-area { text-align: center; margin-bottom: 30px; }
    .logo-tc {
      font-family: var(--font-heading); font-size: 72px; color: var(--amber);
      line-height: 1; text-shadow: 0 0 40px rgba(245,166,35,0.3); margin-bottom: 5px;
    }
    .logo-text { font-family: var(--font-body); font-weight: 700; letter-spacing: 0.3em; font-size: 14px; color: var(--text-muted); }
    .logo-line { height: 1px; background: var(--amber); width: 60px; margin: 20px auto 0; opacity: 0.5; }
    
    .btn-full { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="login-overlay-grid"></div>
  <div class="login-glow glow-1"></div>
  <div class="login-glow glow-2"></div>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-tc">TC</div>
      <div class="logo-text">TEAM CURRENT</div>
      <div class="logo-line"></div>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@teamcurrent.com" required>
      </div>
      <div class="form-group mb-20">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">ACCESS SECURE SYSTEM</button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  
  <script src="/js/transitions.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      
      try {
        btn.classList.add('loading');
        await window.api.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        
        // Let it load next page visually
        document.body.style.transition = 'opacity 0.2s';
        document.body.style.opacity = '0';
        setTimeout(() => window.location.href = '/pages/dashboard.html', 200);
      } catch (err) {
        window.showToast(err.message, 'error');
        btn.classList.remove('loading');
        document.querySelector('.login-card').classList.add('shake');
        setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 400);
      }
    });
    
    // Auto redirect if already logged in
    fetch('/api/auth/verify').then(res => {
      if (res.ok) window.location.href = '/pages/dashboard.html';
    });
  </script>
  <script src="/js/mobile-menu.js"></script>
</body>
</html>
